<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#f97316"/>

  <!-- Lightbulb body: rounded top bulb tapering into the base collar -->
  <path
    d="M16 3
       C9.9 3 5 7.9 5 14
       C5 18.4 7.5 22.1 11.2 23.8
       L11.2 25.2
       C11.2 25.7 11.6 26.1 12.1 26.1
       L19.9 26.1
       C20.4 26.1 20.8 25.7 20.8 25.2
       L20.8 23.8
       C24.5 22.1 27 18.4 27 14
       C27 7.9 22.1 3 16 3Z"
    fill="#0f0d0b"
  />

  <!-- Screw cap ring 1 -->
  <rect x="11.2" y="26.8" width="9.6" height="2" rx="1" fill="#0f0d0b"/>

  <!-- Screw cap ring 2 (slightly narrower) -->
  <rect x="12.5" y="29.2" width="7" height="1.8" rx="0.9" fill="#0f0d0b"/>

  <!-- Glass gleam — small ellipse top-left of bulb to sell the glass/glow -->
  <ellipse cx="11.5" cy="10.5" rx="2.8" ry="1.8" fill="white" opacity="0.18" transform="rotate(-35 11.5 10.5)"/>
</svg>
